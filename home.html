<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home || GitHub Issue Tracker</title>

    <!-- Tailwind + Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Font Awesome icon CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Geist Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- External CSS File  -->
    <link rel="stylesheet" href="" />
  </head>
  <body class="bg-[#F8FAFC] min-h-screen">

    <!-- Nav-Bar -->
    <section class="navbar bg-base-100 shadow-sm">
  <div class="flex-1 items-center flex gap-1 ml-5">
    <img src="assets/github-mini.png" alt="">
    <a class=" font-bold text-xl">GitHub Issues Tracker</a>
  </div>
  <div class="flex gap-2">
   
      </div>
     <div class="join">
  <div>
    <label class="input validator join-item">
      <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
      <input type="email" placeholder="Search " required />
    </label>
    
  </div>
  <button class="btn btn-neutral join-item">Search</button>
</div>
</div>
</div>
</section>

<!-- Filter-Button-Section -->
 <section class="bg-white w-11/12 mx-auto shadow-sm mt-15">
<div class="p-5 gap-[8px]">
        <button
          id="filter-btn"
          onclick="toggleStyle('filter-btn')"
          class="btn btn-sm rounded-md bg-[#4A00FF] text-white"
        >
          All
        </button>

        <button
          id="interview-filter-btn"
          onclick="toggleStyle('interview-filter-btn')"
          class="btn btn-sm rounded-md bg-[#4A00FF] text-white p-3"
        >
          Open
        </button>

        <button
          id="rejected-filter-btn"
          onclick="toggleStyle('rejected-filter-btn')"
          class="btn btn-sm rounded-md bg-[#4A00FF] text-white"
        >
          Closed
        </button>
      </div>
</section>

<!-- Issue-Countr-Section -->
<section class="bg-white p-5 mt-4 w-11/12 mx-auto">
  <main class="flex justify-between items-center">
    <div class="flex items-center gap-2">
      <div>
        <img class="bg-[#ECE4FF] p-2 rounded-full" src="assets/Aperture.png" alt="">
      </div>
      <div>
        <h3 class="font-semibold text-[20px]">50 Issues</h3>
        <p class="text-[#64748B]">Track and manage your project issues</p>
      </div>
  </div>
  <div class="flex items-center">
    <img src="assets/Ellipse 2.png" alt="">
    <span class="pl-1 pr-3">Open</span>
    <img src="assets/Ellipse 1.png" alt="">         
    <span class="pl-1 ">Closed</span>         
  </div>
  </main>     
</section>

<!-- Card-Section -->


<script src="index.js"></script>
  </body>
  </html>
